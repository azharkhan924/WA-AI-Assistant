# ===========================
# Server
# ===========================
server.port=${SERVER_PORT:8082}

# ===========================
# Database (H2 file-based by default — zero setup).
# To use MySQL instead, comment the H2 block and uncomment the MySQL block below.
# ===========================
spring.datasource.url=jdbc:h2:file:./data/whatsappai;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL alternative ---
# spring.datasource.url=jdbc:mysql://localhost:3306/whatsappai?createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===========================
# Admin auth (JWT)
# ===========================
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-in-production-please}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.admin.default-email=${ADMIN_EMAIL:admin@business.com}
app.admin.default-password=${ADMIN_PASSWORD:admin123}

# ===========================
# AI Provider: "gemini" or "groq"
# ===========================
app.ai.provider=${AI_PROVIDER:gemini}

app.ai.gemini.api-keys=${GEMINI_API_KEYS:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models

app.ai.groq.api-keys=${GROQ_API_KEYS:}
app.ai.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.ai.groq.base-url=https://api.groq.com/openai/v1/chat/completions

app.ai.max-tokens=${AI_MAX_TOKENS:600}

# ===========================
# Twilio WhatsApp
# ===========================
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER:whatsapp:+14155238886}
app.twilio.validate-signature=${TWILIO_VALIDATE_SIGNATURE:false}

# ===========================
# CORS - allow the admin dashboard origin
# ===========================
app.cors.allowed-origins=${CORS_ORIGINS:*}

logging.level.com.whatsappai=INFO
