[phases.setup]
nixPkgs = ["jdk17", "maven"]

[phases.build]
cmds = [
  "mkdir -p backend/src/main/resources/static",
  "cp frontend/index.html backend/src/main/resources/static/index.html",
  "cd backend && mvn clean package -DskipTests"
]

[start]
cmd = "java -Dserver.port=$PORT -jar backend/target/*.jar"
